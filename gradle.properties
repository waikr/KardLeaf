# AndroidX is required by Compose, Room, Activity, Lifecycle and Material dependencies.
android.useAndroidX=true
# The project already uses AndroidX artifacts, so Jetifier is not needed unless a future legacy support-lib dependency is added.
android.enableJetifier=false

# Give Gradle/D8/R8 enough heap for dex merging on machines with limited default memory.
# If your computer has 16GB+ RAM, this value is safe. If it has 8GB RAM, close other apps while building.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=1024m

# Limit concurrent workers to reduce peak memory during Kotlin/KSP/D8 tasks.
org.gradle.workers.max=2
org.gradle.parallel=false

kotlin.code.style=official
