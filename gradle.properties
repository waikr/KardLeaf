android.useAndroidX=true

# Avoid KSP incremental compiler state corruption such as:
# lateinit property cleanFilenames has not been initialized
ksp.incremental=false

# Give Gradle/D8 enough heap for dex merging.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=1024m
org.gradle.workers.max=2
org.gradle.parallel=false
