<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="katex.min.css">
    <style>
        :root {
            --kl-preview-fg: #172033;
            --kl-preview-muted: #46627f;
            --kl-preview-border: #d8e6fb;
            --kl-preview-soft: rgba(228, 241, 255, 0.72);
            --kl-preview-primary: #3b82f6;
            --kl-preview-code-bg: rgba(228, 241, 255, 0.82);
            --kl-preview-image-bg: rgba(228, 241, 255, 0.60);
        }

        html {
            min-height: 100%;
            overflow-y: auto;
            overscroll-behavior-y: contain;
        }

        body {
            font-family: sans-serif;
            margin: 6px 12px;
            min-height: 100%;
            line-height: 1.55;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 96px;
            -webkit-overflow-scrolling: touch;
            transition: background-color 0.3s, color 0.3s;
        }

        #content {
            min-height: calc(100vh - 12px);
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        #preview-status {
            display: none;
            margin: 0 0 10px;
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.45;
            background: rgba(25, 103, 210, 0.10);
            color: #174ea6;
        }

        body.dark-mode #preview-status {
            background: rgba(138, 180, 248, 0.16);
            color: #c9ddff;
        }

        body.dark-mode {
            --kl-preview-fg: #e5eef8;
            --kl-preview-muted: #c8d8e8;
            --kl-preview-border: #2b3b4d;
            --kl-preview-soft: rgba(43, 59, 77, 0.72);
            --kl-preview-primary: #93c5fd;
            --kl-preview-code-bg: rgba(23, 33, 45, 0.92);
            --kl-preview-image-bg: rgba(43, 59, 77, 0.72);
        }

        #preview-status.preview-warning {
            background: rgba(251, 188, 5, 0.16);
            color: #8a5a00;
        }

        body.dark-mode #preview-status.preview-warning {
            background: rgba(251, 188, 5, 0.18);
            color: #ffd666;
        }

        #preview-status.preview-error {
            background: rgba(217, 48, 37, 0.12);
            color: #b3261e;
        }

        body.dark-mode #preview-status.preview-error {
            background: rgba(242, 139, 130, 0.18);
            color: #f2b8b5;
        }

        #content.large-plain-preview {
            white-space: pre-wrap;
            font-family: sans-serif;
        }

        h1 {
            font-size: 1.68rem;
            line-height: 1.24;
            margin: 0 0 10px;
        }

        h2 {
            font-size: 1.42rem;
            line-height: 1.30;
            margin: 14px 0 7px;
        }

        h3,
        h4,
        h5,
        h6 {
            margin: 12px 0 6px;
        }

        h1, h2, h3, h4, h5, h6,
        h1 *, h2 *, h3 *, h4 *, h5 *, h6 * {
            color: var(--kl-preview-fg);
            border: 0 !important;
            border-bottom: 0 !important;
            outline: 0 !important;
            box-shadow: none !important;
            text-decoration: none !important;
            text-decoration-line: none !important;
            background-image: none !important;
        }

        h1::before, h1::after,
        h2::before, h2::after,
        h3::before, h3::after,
        h4::before, h4::after,
        h5::before, h5::after,
        h6::before, h6::after {
            content: none !important;
            display: none !important;
            border: 0 !important;
            box-shadow: none !important;
            background-image: none !important;
        }

        #content h1:empty,
        #content h2:empty,
        #content h3:empty,
        #content h4:empty,
        #content h5:empty,
        #content h6:empty {
            display: none !important;
            margin: 0 !important;
            padding: 0 !important;
            border: 0 !important;
        }

        p {
            margin: 6px 0;
        }

        /* Light Mode (Default) */
        body {
            background-color: transparent;
            color: var(--kl-preview-fg);
        }

        /* Dark Mode */
        body.dark-mode {
            background-color: transparent;
            color: var(--kl-preview-fg);
        }

        body.dark-mode h1,
        body.dark-mode h2,
        body.dark-mode h3,
        body.dark-mode h4,
        body.dark-mode h5,
        body.dark-mode h6 {
            color: var(--kl-preview-fg);
        }

        a {
            color: var(--kl-preview-primary);
        }

        body.dark-mode a {
            color: var(--kl-preview-primary);
        }

        blockquote {
            border-left: 4px solid var(--kl-preview-border);
            margin: 0;
            padding-left: 16px;
            color: var(--kl-preview-muted);
        }

        body.dark-mode blockquote {
            border-left-color: var(--kl-preview-border);
            color: var(--kl-preview-muted);
        }

        pre {
            background-color: var(--kl-preview-code-bg);
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
        }

        .code-block-wrapper {
            position: relative;
            margin: 8px 0;
        }

        .code-block-wrapper pre {
            margin: 0;
            padding-top: 40px;
        }

        .code-copy-button {
            position: absolute;
            top: 8px;
            right: 8px;
            border: 1px solid rgba(0, 0, 0, 0.18);
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 12px;
            color: #111111;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        }

        body.dark-mode .code-copy-button {
            color: #ffffff;
            background: rgba(0, 0, 0, 0.72);
            border-color: rgba(255, 255, 255, 0.26);
        }

        body.dark-mode pre {
            background-color: var(--kl-preview-code-bg);
        }

        code {
            font-family: monospace;
            background-color: var(--kl-preview-code-bg);
            padding: 2px 4px;
            border-radius: 2px;
        }

        body.dark-mode code {
            background-color: var(--kl-preview-code-bg);
        }

        /* Tables */
        .table-scroll-wrapper {
            width: 100%;
            max-width: 100%;
            margin: 8px 0 16px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }

        table {
            display: table;
            width: 100%;
            min-width: 100%;
            max-width: 100%;
            table-layout: fixed;
            box-sizing: border-box;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-collapse: separate;
            border-spacing: 0;
            margin: 8px 0 16px;
            border: 1px solid var(--kl-preview-border);
            border-radius: 8px;
            background: var(--kl-preview-soft);
        }

        .table-scroll-wrapper table {
            width: max-content;
            min-width: 100%;
            max-width: none;
            table-layout: auto;
            margin: 0;
        }

        th,
        td {
            border: 0;
            border-right: 1px solid var(--kl-preview-border);
            border-bottom: 1px solid var(--kl-preview-border);
            padding: 8px;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        th:last-child,
        td:last-child {
            border-right: 0;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        th {
            color: var(--kl-preview-fg);
            font-weight: 700;
            background: var(--kl-preview-code-bg);
        }

        body.dark-mode th,
        body.dark-mode td {
            border-color: var(--kl-preview-border);
        }

        tr:nth-child(even) {
            background-color: var(--kl-preview-soft);
        }

        body.dark-mode tr:nth-child(even) {
            background-color: var(--kl-preview-soft);
        }

        /* Checkboxes */
        .task-list-item-checkbox {
            margin-right: 8px;
            cursor: pointer;
        }

        /* Images */
        img {
            display: block;
            max-width: calc(100% - 6px);
            height: auto;
            margin: 10px 3px 12px;
            border-radius: 6px;
            background-color: var(--kl-preview-image-bg);
            box-shadow:
                0 -1px 2px rgba(0, 0, 0, 0.06),
                0 1px 3px rgba(0, 0, 0, 0.10),
                0 2px 5px rgba(0, 0, 0, 0.16);
        }

        body.dark-mode img {
            background-color: var(--kl-preview-image-bg);
            box-shadow:
                0 -1px 2px rgba(0, 0, 0, 0.26),
                0 1px 3px rgba(0, 0, 0, 0.34),
                0 2px 6px rgba(0, 0, 0, 0.42);
        }

        /* List Formatting */
        ul, ol {
            padding-left: 24px;
            margin-top: 4px;
            margin-bottom: 4px;
        }
        li {
            display: list-item;
            margin-bottom: 4px;
        }

        .preview-search-highlight {
            background: rgba(255, 214, 10, 0.55);
            border-radius: 3px;
            padding: 0 1px;
        }

        body.dark-mode .preview-search-highlight {
            background: rgba(255, 214, 10, 0.35);
        }

        .preview-search-highlight-current {
            outline: 2px solid rgba(255, 152, 0, 0.85);
        }
    </style>
</head>

<body>
    <script>
        if (new URLSearchParams(window.location.search).get('dark') === 'true') {
            document.body.classList.add('dark-mode');
        }
    </script>
    <div id="preview-status"></div>
    <div id="content"></div>

    <script src="markdown-it.min.js"></script>
    <script src="katex.min.js"></script>
    <script src="markdown-it-texmath.min.js"></script>
    <script src="markdown-it-task-lists.min.js"></script>

    <script>
        // Initialize MarkdownIt
        const md = window.markdownit({
            html: false, // Fix XSS by disabling raw HTML
            linkify: true,
            typographer: true,
            breaks: true
        });
        try { md.enable(['table']); } catch (error) { console.warn('[KardLeafPreview] enable table failed: ' + error); }
        const defaultValidateLink = md.validateLink.bind(md);
        md.validateLink = function (url) {
            const value = String(url || '').trim();
            if (/^data:image\//i.test(value)) return true;
            return defaultValidateLink(value);
        };

        // Add support for <u> tag safely
        md.inline.ruler.before('emphasis', 'underline', (state, silent) => {
            const marker = '<u>';
            const closer = '</u>';
            if (!state.src.startsWith(marker, state.pos)) return false;

            const start = state.pos;
            const end = state.src.indexOf(closer, start + marker.length);
            if (end === -1) return false;

            if (!silent) {
                const tokenOpen = state.push('underline_open', 'u', 1);
                tokenOpen.markup = marker;

                const oldMax = state.posMax;
                state.pos += marker.length;
                state.posMax = end;
                state.md.inline.tokenize(state);
                state.posMax = oldMax;

                const tokenClose = state.push('underline_close', 'u', -1);
                tokenClose.markup = closer;
            }
            state.pos = end + closer.length;
            return true;
        });

        // Use Plugins
        md.use(window.markdownitTaskLists, { enabled: true });
        md.use(texmath, {
            engine: katex,
            delimiters: 'dollars',
            katexOptions: { macros: { "\\RR": "\\mathbb{R}" } }
        });

        // Store content
        const contentDiv = document.getElementById('content');
        const statusDiv = document.getElementById('preview-status');
        const LARGE_MARKDOWN_RENDER_LIMIT = 500000;
        const LARGE_PREVIEW_IMMEDIATE_TEXT_LIMIT = 80000;
        const SOURCE_OFFSET_MAX_CHARS = 80000;
        const EMBEDDED_IMAGE_DATA_URI_REGEX = /data:image\/[^\s)]+;base64,[A-Za-z0-9+/=]+/g;
        let currentMarkdownSource = '';
        let previewRenderToken = 0;
        let androidPreviewToken = 0;
        let pendingMarkdownRenderTimer = 0;

        function tracePreviewShortText(value, limit) {
            const text = String(value || '').replace(/\r/g, '').replace(/\n/g, '\\n');
            return text.length > limit ? text.slice(0, limit) + '...' : text;
        }

        function tracePreviewInput(source) {
            try {
                const lines = String(source || '').split(/\r?\n/);
                const rawTables = [];
                const atxHeadings = [];
                const setextHeadingMarkers = [];
                for (let index = 0; index < lines.length; index++) {
                    const line = lines[index] || '';
                    const trimmed = line.trim();
                    if (trimmed.indexOf('|') >= 0 && /^\s{0,3}\S.*\|.*\S\s*$/.test(line)) {
                        rawTables.push({ line: index + 1, text: line });
                    }
                    if (/^\s{0,3}#{1,6}\s+\S/.test(line)) {
                        atxHeadings.push({ line: index + 1, text: line });
                    }
                    if (/^\s{0,3}(=+|-{2,})\s*$/.test(line) && index > 0 && (lines[index - 1] || '').trim()) {
                        setextHeadingMarkers.push({ line: index + 1, previous: lines[index - 1], marker: line });
                    }
                }
                let tokenTableOpen = 0;
                let tokenHeadingOpen = 0;
                try {
                    const tokens = md.parse(String(source || ''), {});
                    tokenTableOpen = tokens.filter((token) => token.type === 'table_open').length;
                    tokenHeadingOpen = tokens.filter((token) => token.type === 'heading_open').length;
                } catch (tokenError) {
                    console.log('[KardLeafPreviewTableTrace] token parse failed error=' + tokenError);
                }
                console.log(
                    '[KardLeafPreviewTableTrace] input len=' + String(source || '').length +
                    ' lines=' + lines.length +
                    ' rawTableCandidates=' + rawTables.length +
                    ' atxHeadings=' + atxHeadings.length +
                    ' setextHeadingMarkers=' + setextHeadingMarkers.length +
                    ' tokenTableOpen=' + tokenTableOpen +
                    ' tokenHeadingOpen=' + tokenHeadingOpen
                );
                rawTables.slice(0, 6).forEach((item, offset) => {
                    console.log('[KardLeafPreviewTableTrace] rawTable#' + offset + ' line=' + item.line + ' text=' + tracePreviewShortText(item.text, 220));
                });
                setextHeadingMarkers.slice(0, 4).forEach((item, offset) => {
                    console.log('[KardLeafPreviewTableTrace] setextHeading#' + offset + ' line=' + item.line + ' previous=' + tracePreviewShortText(item.previous, 160) + ' marker=' + tracePreviewShortText(item.marker, 80));
                });
            } catch (error) {
                console.log('[KardLeafPreviewTableTrace] input trace failed error=' + error);
            }
        }

        function tracePreviewRendered(source) {
            try {
                const headings = Array.from(contentDiv.querySelectorAll('h1,h2,h3,h4,h5,h6'));
                const tables = Array.from(contentDiv.querySelectorAll('table'));
                const underlineElements = Array.from(contentDiv.querySelectorAll('u, [style*="underline"], [style*="text-decoration"]'));
                console.log(
                    '[KardLeafPreviewTableTrace] rendered len=' + String(source || '').length +
                    ' headings=' + headings.length +
                    ' tables=' + tables.length +
                    ' underlineElements=' + underlineElements.length +
                    ' contentChildren=' + contentDiv.children.length
                );
                const heading = headings[0];
                if (heading) {
                    const style = window.getComputedStyle(heading);
                    const afterStyle = window.getComputedStyle(heading, '::after');
                    const rect = heading.getBoundingClientRect();
                    console.log(
                        '[KardLeafPreviewTableTrace] firstHeading tag=' + heading.tagName +
                        ' class=' + tracePreviewShortText(heading.className, 120) +
                        ' text=' + tracePreviewShortText(heading.textContent, 160) +
                        ' rect=' + Math.round(rect.width) + 'x' + Math.round(rect.height) +
                        ' borderBottom=' + style.borderBottom +
                        ' textDecoration=' + style.textDecorationLine + '/' + style.textDecorationStyle + '/' + style.textDecorationThickness +
                        ' backgroundImage=' + tracePreviewShortText(style.backgroundImage, 120) +
                        ' boxShadow=' + tracePreviewShortText(style.boxShadow, 120) +
                        ' afterContent=' + tracePreviewShortText(afterStyle.content, 80) +
                        ' afterDisplay=' + afterStyle.display +
                        ' afterBorderBottom=' + afterStyle.borderBottom
                    );
                }
                const table = tables[0];
                if (table) {
                    const style = window.getComputedStyle(table);
                    const parentStyle = table.parentElement ? window.getComputedStyle(table.parentElement) : null;
                    const firstCell = table.querySelector('th,td');
                    const cellStyle = firstCell ? window.getComputedStyle(firstCell) : null;
                    console.log(
                        '[KardLeafPreviewTableTrace] firstTable rows=' + table.rows.length +
                        ' html=' + tracePreviewShortText(table.outerHTML, 500) +
                        ' display=' + style.display +
                        ' width=' + style.width +
                        ' tableLayout=' + style.tableLayout +
                        ' borderCollapse=' + style.borderCollapse +
                        ' border=' + style.border +
                        ' parentOverflowX=' + (parentStyle ? parentStyle.overflowX : '') +
                        ' cellBorder=' + (cellStyle ? cellStyle.border : '') +
                        ' cellPadding=' + (cellStyle ? cellStyle.padding : '') +
                        ' cellWhiteSpace=' + (cellStyle ? cellStyle.whiteSpace : '')
                    );
                }
                const underline = underlineElements[0];
                if (underline) {
                    const style = window.getComputedStyle(underline);
                    console.log(
                        '[KardLeafPreviewTableTrace] firstUnderline tag=' + underline.tagName +
                        ' class=' + tracePreviewShortText(underline.className, 100) +
                        ' style=' + tracePreviewShortText(underline.getAttribute('style'), 160) +
                        ' text=' + tracePreviewShortText(underline.textContent, 160) +
                        ' computedDecoration=' + style.textDecorationLine + '/' + style.textDecorationStyle + '/' + style.textDecorationThickness
                    );
                }
            } catch (error) {
                console.log('[KardLeafPreviewTableTrace] rendered trace failed error=' + error);
            }
        }

        function previewRenderCost(source) {
            return (source || '').replace(EMBEDDED_IMAGE_DATA_URI_REGEX, 'data:image;base64,...').length;
        }

        function setPreviewStatus(type, message) {
            if (!statusDiv) return;
            statusDiv.className = '';
            if (type) statusDiv.classList.add(type);
            statusDiv.textContent = message || '';
            statusDiv.style.display = message ? 'block' : 'none';
        }

        function clearPreviewStatus() {
            setPreviewStatus('', '');
        }

        function renderPlainPreview(source) {
            contentDiv.classList.add('large-plain-preview');
            contentDiv.textContent = source;
        }
        let currentLineStartOffsets = [0];

        function rebuildLineStartOffsets(source) {
            currentLineStartOffsets = [0];
            for (let i = 0; i < source.length; i++) {
                if (source.charCodeAt(i) === 10) currentLineStartOffsets.push(i + 1);
            }
        }

        function offsetForLine(line) {
            if (line <= 0) return 0;
            if (line >= currentLineStartOffsets.length) return currentMarkdownSource.length;
            return currentLineStartOffsets[line];
        }

        function assignSourceOffsets(source) {
            const tokens = md.parse(source, {});
            const selectorByType = {
                heading_open: 'h1,h2,h3,h4,h5,h6',
                paragraph_open: 'p',
                list_item_open: 'li',
                fence: 'pre',
                code_block: 'pre',
                blockquote_open: 'blockquote',
                table_open: 'table'
            };
            const used = new WeakSet();
            tokens.forEach((token) => {
                const selector = selectorByType[token.type];
                if (!selector || !token.map) return;
                const element = Array.from(contentDiv.querySelectorAll(selector)).find((candidate) => !used.has(candidate));
                if (!element) return;
                used.add(element);
                element.dataset.sourceStart = String(offsetForLine(token.map[0]));
                element.dataset.sourceEnd = String(offsetForLine(token.map[1]));
            });
        }

        function textOffsetInElement(element, node, nodeOffset) {
            let offset = 0;
            const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);
            while (walker.nextNode()) {
                const current = walker.currentNode;
                if (current === node) return offset + Math.max(0, nodeOffset);
                offset += (current.nodeValue || '').length;
            }
            return -1;
        }

        function caretTextOffsetInElement(element, x, y) {
            let node = null;
            let offset = 0;
            if (document.caretPositionFromPoint) {
                const position = document.caretPositionFromPoint(x, y);
                node = position && position.offsetNode;
                offset = position ? position.offset : 0;
            } else if (document.caretRangeFromPoint) {
                const range = document.caretRangeFromPoint(x, y);
                node = range && range.startContainer;
                offset = range ? range.startOffset : 0;
            }
            if (!node || !element.contains(node)) return -1;
            return textOffsetInElement(element, node, offset);
        }

        window.getMarkdownOffsetAtPoint = function (x, y) {
            const sourceLength = currentMarkdownSource.length;
            if (sourceLength <= 0) return 0;

            const plainOffset = caretTextOffsetInElement(contentDiv, x, y);
            if (contentDiv.classList.contains('large-plain-preview') && plainOffset >= 0) {
                return Math.max(0, Math.min(sourceLength, plainOffset));
            }

            const hit = document.elementFromPoint(x, y);
            const block = hit ? hit.closest('[data-source-start]') : null;
            if (block) {
                const start = parseInt(block.dataset.sourceStart || '0', 10);
                const end = parseInt(block.dataset.sourceEnd || String(sourceLength), 10);
                const textLength = Math.max(1, (block.innerText || block.textContent || '').length);
                const blockTextOffset = caretTextOffsetInElement(block, x, y);
                if (blockTextOffset >= 0) {
                    const ratio = Math.max(0, Math.min(1, blockTextOffset / textLength));
                    return Math.max(0, Math.min(sourceLength, Math.round(start + (end - start) * ratio)));
                }

                const rect = block.getBoundingClientRect();
                const ratio = rect.height > 1 ? Math.max(0, Math.min(1, (y - rect.top) / rect.height)) : 0;
                return Math.max(0, Math.min(sourceLength, Math.round(start + (end - start) * ratio)));
            }

            const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
            const ratio = Math.max(0, Math.min(1, window.scrollY / maxScroll));
            return Math.round(sourceLength * ratio);
        };

        function looksLikePreviewTableSeparator(text) {
            return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(String(text || ''));
        }

        function looksLikePreviewTableRow(text) {
            const raw = String(text || '');
            const trimmed = raw.trim();
            const count = (raw.match(/\|/g) || []).length;
            return count >= 2 && !/^https?:\/\//i.test(trimmed);
        }

        function normalizeMarkdownTables(source) {
            const lines = String(source || '').split('\n');
            const out = [];
            let changed = false;
            let inFence = false;
            let fenceChar = '';
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const fence = /^\s*(```+|~~~+)/.exec(line);
                if (fence) {
                    const marker = fence[1].charAt(0);
                    if (!inFence) { inFence = true; fenceChar = marker; }
                    else if (marker === fenceChar) { inFence = false; fenceChar = ''; }
                    out.push(line);
                    continue;
                }
                if (!inFence && i + 1 < lines.length && looksLikePreviewTableRow(line) && looksLikePreviewTableSeparator(lines[i + 1])) {
                    if (out.length && out[out.length - 1].trim() !== '') { out.push(''); changed = true; }
                    out.push(line);
                    i += 1;
                    out.push(lines[i]);
                    while (i + 1 < lines.length && looksLikePreviewTableRow(lines[i + 1]) && !looksLikePreviewTableSeparator(lines[i + 1])) {
                        i += 1;
                        out.push(lines[i]);
                    }
                    if (i + 1 < lines.length && lines[i + 1].trim() !== '') { out.push(''); changed = true; }
                    continue;
                }
                out.push(line);
            }
            return changed ? out.join('\n') : source;
        }

        function wrapRenderedTables() {
            contentDiv.querySelectorAll('table').forEach((table) => {
                if (table.parentElement && table.parentElement.classList.contains('table-scroll-wrapper')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'table-scroll-wrapper';
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);
            });
        }

        function renderMarkdownPreview(source, token, androidToken) {
            if (token !== previewRenderToken || androidToken !== androidPreviewToken) return 'stale';
            const start = performance.now();
            try {
                const renderSource = normalizeMarkdownTables(source);
                const html = md.render(renderSource);
                if (token !== previewRenderToken || androidToken !== androidPreviewToken) return 'stale';
                if (source.length > 0 && !html.trim()) {
                    throw new Error('empty rendered html');
                }
                clearPreviewStatus();
                contentDiv.classList.remove('large-plain-preview');
                contentDiv.innerHTML = html;
                wrapRenderedTables();
                if (source.length <= SOURCE_OFFSET_MAX_CHARS) {
                    assignSourceOffsets(source);
                }
                attachCheckboxListeners();
                attachImageClickListeners();
                attachCodeBlockCopyButtons();
                tracePreviewRendered(source);
                console.log('[KardLeafPreview] render markdown done len=' + source.length + ' elapsed=' + (performance.now() - start).toFixed(1) + 'ms');
                return 'markdown';
            } catch (error) {
                console.error('[KardLeafPreview] render failed: ' + error);
                setPreviewStatus('preview-error', 'Markdown 预览渲染失败，已显示纯文本，避免页面空白。');
                renderPlainPreview(source);
                return 'plain_error';
            }
        }

        // Main Update Function
        window.updateContent = function (markdown, isDark, androidToken) {
            const incomingAndroidToken = Number(androidToken) || 0;
            if (incomingAndroidToken < androidPreviewToken) {
                console.log('[KardLeafPreview] render dropped old token=' + incomingAndroidToken + ' current=' + androidPreviewToken + ' len=' + ((markdown || '').length));
                return 'stale_android';
            }
            androidPreviewToken = incomingAndroidToken;
            if (pendingMarkdownRenderTimer) {
                clearTimeout(pendingMarkdownRenderTimer);
                pendingMarkdownRenderTimer = 0;
            }
            if (isDark) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');

            const source = markdown || '';
            const token = ++previewRenderToken;
            const renderCost = previewRenderCost(source);
            currentMarkdownSource = source;
            rebuildLineStartOffsets(source);
            console.log('[KardLeafPreview] render start len=' + source.length + ' cost=' + renderCost + ' dark=' + !!isDark);
            tracePreviewInput(source);
            if (renderCost > LARGE_MARKDOWN_RENDER_LIMIT) {
                setPreviewStatus('preview-warning', '快速预览：当前笔记很大，已完整显示纯文本内容，暂不进行全文 Markdown 渲染以避免卡死。');
                renderPlainPreview(source);
                console.log('[KardLeafPreview] render plain large len=' + source.length + ' cost=' + renderCost + ' limit=' + LARGE_MARKDOWN_RENDER_LIMIT);
                return 'plain_large';
            }

            if (source.length > LARGE_PREVIEW_IMMEDIATE_TEXT_LIMIT) {
                setPreviewStatus('preview-warning', '正在渲染 Markdown 预览，先显示纯文本以避免空白。');
                renderPlainPreview(source);
                pendingMarkdownRenderTimer = setTimeout(function () {
                    pendingMarkdownRenderTimer = 0;
                    renderMarkdownPreview(source, token, incomingAndroidToken);
                }, 16);
                console.log('[KardLeafPreview] render queued large len=' + source.length + ' limit=' + LARGE_MARKDOWN_RENDER_LIMIT);
                return 'queued_large';
            }

            return renderMarkdownPreview(source, token, incomingAndroidToken);
        };

        window.updateContentFromAndroid = function (isDark, androidToken) {
            const markdown = (window.Android && window.Android.getMarkdown)
                ? window.Android.getMarkdown()
                : '';
            return window.updateContent(markdown, isDark, androidToken);
        };

        window.clearContentFromAndroid = function (androidToken) {
            const incomingAndroidToken = Number(androidToken) || 0;
            if (incomingAndroidToken < androidPreviewToken) return 'stale_android';
            androidPreviewToken = incomingAndroidToken;
            previewRenderToken++;
            if (pendingMarkdownRenderTimer) {
                clearTimeout(pendingMarkdownRenderTimer);
                pendingMarkdownRenderTimer = 0;
            }
            currentMarkdownSource = '';
            currentLineStartOffsets = [0];
            clearPreviewStatus();
            contentDiv.classList.remove('large-plain-preview');
            contentDiv.innerHTML = '';
            console.log('[KardLeafPreview] render cleared token=' + incomingAndroidToken);
            return 'cleared';
        };

        function attachCheckboxListeners() {
            const checkboxes = document.querySelectorAll('.task-list-item-checkbox');
            checkboxes.forEach((cb, index) => {
                cb.disabled = false; // Look enabled
                cb.onchange = function () {
                    console.log("Checkbox toggled at index: " + index);
                    // Pass the GLOBAL index of the checkbox to Android.
                    // Android will have to find the N-th "- [ ]" in the text and toggle it.
                    if (window.Android) {
                        window.Android.onCheckboxToggled(index, cb.checked);
                    }
                };
                cb.ontouchstart = function () {
                    if (window.Android && window.Android.onPreviewControlTouched) {
                        window.Android.onPreviewControlTouched();
                    }
                };
            });
        }

        function attachImageClickListeners() {
            const images = contentDiv.querySelectorAll('img');
            images.forEach((img, index) => {
                img.onclick = function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    if (window.Android && window.Android.onPreviewControlTouched) {
                        window.Android.onPreviewControlTouched();
                    }
                    if (window.Android && window.Android.onImageClicked) {
                        window.Android.onImageClicked(index);
                    }
                    return false;
                };
                img.ontouchstart = function (event) {
                    event.stopPropagation();
                    if (window.Android && window.Android.onPreviewControlTouched) {
                        window.Android.onPreviewControlTouched();
                    }
                };
            });
        }

        function attachCodeBlockCopyButtons() {
            const blocks = contentDiv.querySelectorAll('pre');
            blocks.forEach((pre) => {
                if (pre.parentElement && pre.parentElement.classList.contains('code-block-wrapper')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);
                const button = document.createElement('button');
                button.className = 'code-copy-button';
                button.type = 'button';
                button.textContent = '复制';
                button.onclick = function (event) {
                    event.stopPropagation();
                    if (window.Android && window.Android.copyCodeBlock) {
                        window.Android.copyCodeBlock(pre.innerText || pre.textContent || '');
                    }
                    button.textContent = '已复制';
                    setTimeout(() => { button.textContent = '复制'; }, 1200);
                };
                button.ontouchstart = function (event) {
                    event.stopPropagation();
                    if (window.Android && window.Android.onPreviewControlTouched) {
                        window.Android.onPreviewControlTouched();
                    }
                };
                wrapper.appendChild(button);
            });
        }

        function clearSearchHighlights() {
            const highlights = contentDiv.querySelectorAll('.preview-search-highlight');
            highlights.forEach((span) => {
                const text = document.createTextNode(span.textContent || '');
                span.parentNode.replaceChild(text, span);
                text.parentNode.normalize();
            });
        }

        function clearCurrentSearchHighlight() {
            contentDiv.querySelectorAll('.preview-search-highlight-current').forEach((span) => {
                span.classList.remove('preview-search-highlight-current');
            });
        }

        function scrollToSearchHighlight(index) {
            const highlights = Array.from(contentDiv.querySelectorAll('.preview-search-highlight'));
            if (!highlights.length) return false;
            const safeIndex = Math.max(0, Math.min(highlights.length - 1, Number(index) || 0));
            clearCurrentSearchHighlight();
            const target = highlights[safeIndex];
            target.classList.add('preview-search-highlight-current');
            target.scrollIntoView({ block: 'center', behavior: 'smooth' });
            return true;
        }

        window.scrollToSearchHighlight = scrollToSearchHighlight;

        window.applySearchHighlight = function (query) {
            clearSearchHighlights();
            const q = (query || '').trim();
            if (!q) return 0;
            const lower = q.toLowerCase();
            const walker = document.createTreeWalker(contentDiv, NodeFilter.SHOW_TEXT, {
                acceptNode: function (node) {
                    const parent = node.parentElement;
                    if (!parent || parent.closest('button')) return NodeFilter.FILTER_REJECT;
                    return node.nodeValue.toLowerCase().indexOf(lower) >= 0
                        ? NodeFilter.FILTER_ACCEPT
                        : NodeFilter.FILTER_REJECT;
                }
            });
            const nodes = [];
            while (walker.nextNode()) nodes.push(walker.currentNode);
            let firstHighlight = null;
            let count = 0;
            nodes.forEach((node) => {
                const text = node.nodeValue;
                const fragment = document.createDocumentFragment();
                let start = 0;
                let index = text.toLowerCase().indexOf(lower, start);
                while (index >= 0) {
                    if (index > start) fragment.appendChild(document.createTextNode(text.slice(start, index)));
                    const span = document.createElement('span');
                    span.className = 'preview-search-highlight';
                    span.textContent = text.slice(index, index + q.length);
                    fragment.appendChild(span);
                    if (!firstHighlight) firstHighlight = span;
                    count++;
                    start = index + q.length;
                    index = text.toLowerCase().indexOf(lower, start);
                }
                if (start < text.length) fragment.appendChild(document.createTextNode(text.slice(start)));
                node.parentNode.replaceChild(fragment, node);
            });
            if (firstHighlight) {
                scrollToSearchHighlight(0);
            }
            return count;
        };

        window.scrollToHeading = function (text, level) {
            const normalized = (text || '').trim();
            if (!normalized) return false;
            const selector = level > 0 ? 'h' + level : 'h1,h2,h3,h4,h5,h6';
            const headings = Array.from(contentDiv.querySelectorAll(selector));
            const target = headings.find((heading) => (heading.textContent || '').trim() === normalized)
                || Array.from(contentDiv.querySelectorAll('h1,h2,h3,h4,h5,h6'))
                    .find((heading) => (heading.textContent || '').trim() === normalized);
            if (target) {
                target.scrollIntoView({ block: 'start', behavior: 'smooth' });
                return true;
            }
            return false;
        };

        window.onerror = function (msg, url, line) {
            console.error("Preview Error: " + msg);
        };
    </script>
</body>
