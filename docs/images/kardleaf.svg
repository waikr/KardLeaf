<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
<title id="title">KardLeaf 应用图标</title>
<desc id="desc">纯矢量的蓝绿色 Markdown 笔记卡片图标</desc>
<defs>
  <linearGradient id="outerFill" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fbfdff"/>
  </linearGradient>
  <linearGradient id="backCard" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#dbeaff"/><stop offset="0.58" stop-color="#c6ddff"/><stop offset="1" stop-color="#b5d2ff"/>
  </linearGradient>
  <linearGradient id="frontCard" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fbfdff"/>
  </linearGradient>
  <linearGradient id="blueStroke" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#78b2ff"/><stop offset="1" stop-color="#4e98ff"/>
  </linearGradient>
  <linearGradient id="greenTab" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#a7f4ca"/><stop offset="1" stop-color="#7fe6b2"/>
  </linearGradient>
  <linearGradient id="foldFill" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffffff"/><stop offset="0.55" stop-color="#eef5ff"/><stop offset="1" stop-color="#d7e8ff"/>
  </linearGradient>
  <filter id="outerShadow" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="22" stdDeviation="32" flood-color="#89a8cc" flood-opacity="0.18"/>
  </filter>
  <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#7893b5" flood-opacity="0.22"/>
  </filter>
  <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6f89a9" flood-opacity="0.15"/>
  </filter>
</defs>
